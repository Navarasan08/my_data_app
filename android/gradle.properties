org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Kotlin incremental compilation breaks when pub cache (C:) and project (E:)
# live on different drives on Windows — the RelocatableFileToPathConverter
# throws "this and base files have different roots". Disabling incremental
# compilation avoids the bug.
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false
