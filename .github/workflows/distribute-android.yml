name: Distribute Android to Firebase

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for testers'
        required: false
        default: 'Latest build from master'
      groups:
        description: 'Firebase tester group(s), comma separated'
        required: false
        default: 'testers'

env:
  FIREBASE_ANDROID_APP_ID: '1:446250056140:android:24cf269eaae717ca754569'
  DEFAULT_TESTER_GROUPS: 'testers'

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: ${{ github.event.inputs.groups || env.DEFAULT_TESTER_GROUPS }}
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            ${{ github.event.inputs.release_notes || format('Build from {0} — {1}', github.ref_name, github.sha) }}
